name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y cmake g++

      - name: Configure (ASan)
        run: >
          cmake -B build -S concurrent-cache
          -DCMAKE_BUILD_TYPE=Debug
          -DCC_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure
